<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Glofy | Email Signature Generator</title>

  <!-- Montserrat only for the generator UI (browser). Email clients may fallback. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --border:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
      --link:#2563eb;
      --bg:#ffffff;
      --panel:#fafafa;
    }
    body{
      font-family: Montserrat, Arial, sans-serif;
      color: var(--text);
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 48px;
      line-height: 1.35;
      background: var(--bg);
    }
    h1{
  font-size:20px;
  margin:0 0 14px;
  font-weight:700;
  color:#383838;
   } 
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }
    .card{
      border:1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background:#fff;
    }
    label{
       display:block;
        font-size:12px;
        font-weight:600;     /* ✅ “medium/bold light” */
        color:#383838;       /* ✅ destaca sobre los placeholders */
        margin:10px 0 6px;
    }
    input{
      width:100%;
      box-sizing:border-box;          /* ✅ evita que se “salga” del contenedor */
      padding:10px 10px;
      border:1px solid var(--border);
      border-radius:10px;
      font-family: Montserrat, Arial, sans-serif;
      font-size:13px;
      outline:none;
    }
    input:focus{
      border-color:#c7d2fe;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }
    .row{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
    button{
      border:1px solid var(--border);
      background:#383838;
      color:#fff;
      padding:10px 12px;
      border-radius: 10px;
      font-family: Montserrat, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor:pointer;
    }
    button.secondary{ background:#fff; color:#111827; }
    .previewFrame{
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--panel);
    }
    #signatureToCopy{
       display:inline-block;
  background:transparent !important;
  border:none !important;
  box-shadow:none !important;
  outline:none !important;
    }
    .toast{ font-size: 12px; color: var(--muted); margin-top: 10px; min-height: 16px; }

    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <h1>Glofy | Email Signature Generator</h1>

  <div class="grid">
   <div class="card">
  <div class="row">
    <div>
      <label>Nombre y apellido</label>
      <input id="name" placeholder="Nombre Apellido" value="">
    </div>
  </div>

  <div class="row">
    <div>
      <label>Puesto</label>
      <input id="title" placeholder="Indica tu puesto" value="">
    </div>
  </div>

  <div>
    <label>LinkedIn URL</label>
    <input id="linkedin" placeholder="Pega el URL de tu perfil de LinkedIn" value="">
  </div>

  <div>
    <label>Foto URL</label>
    <input id="photo" placeholder="Pega el URL que te enviamos" value="">
  </div>

  <div class="actions">
    <button onclick="renderSignature()">Generar</button>
    <button class="secondary" onclick="copySignature()">Copiar firma</button>
    <button class="secondary" onclick="clearAll()">Limpiar</button>
  </div>

  <div id="toast" class="toast"></div>
</div>

    <div class="card">
      <div class="previewFrame">
  <div id="signatureToCopy" style="background:transparent;border:none;box-shadow:none;"></div>
</div>
    </div>
  </div>

  <script>
    // ====== HARD CODED (hidden from user) ======
    const PHOTO_WIDTH_PX = 80;            // fixed (you can change here if needed)

    const CONFIDENTIALITY_NOTICE =
      "Confidentiality Notice: This email and any attachments are intended solely for the use of the intended recipient and may contain confidential or privileged information. If you are not the intended recipient, please notify the sender immediately and delete this email. Any unauthorized review, use, disclosure, or distribution is prohibited.";
    // ==========================================

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function renderSignature(){
      const name = esc(document.getElementById("name").value.trim());
      const title = esc(document.getElementById("title").value.trim());
      const websiteRaw = "https://glofy.co";
      const linkedinRaw = document.getElementById("linkedin").value.trim();
      const photoRaw = document.getElementById("photo").value.trim();

      // Email-safe font stack (Montserrat first; fallback to Arial)
      const font = "font-family:Montserrat, Arial, sans-serif;";

      // Photo: keep original shape (no circle). Prevent deformation.
      const photoStyle = `display:block; width:${PHOTO_WIDTH_PX}px; height:auto;`;

      // LinkedIn always visible as text link when provided
    const linkedinBlock = linkedinRaw
  ? `<div style="margin-top:6px; ${font} font-size:13px; line-height:18px;">
       <a href="${esc(linkedinRaw)}" target="_blank" style="color:#2563eb; text-decoration:none; ${font}">LinkedIn</a>
     </div>`
  : "";


 const html = `
  <div style="background:transparent; border:none; box-shadow:none; outline:none; margin:0; padding:0;">
    <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse:collapse; background:transparent; border:none; box-shadow:none;">
      <tr>
        <td style="vertical-align:top; padding-right:14px;">
          ${photoRaw ? `<img src="${esc(photoRaw)}" alt="${name}" style="${photoStyle}">` : ""}
        </td>

        <td style="vertical-align:top; ${font} color:#111827;">
          <div style="${font} font-size:16px; font-weight:700; line-height:20px; color:#111827;">
            ${name || ""}
          </div>

          <div style="${font} font-size:13px; font-weight:400; line-height:18px; color:#111827; margin-top:2px;">
            ${title || ""}
          </div>

          <div style="margin-top:4px; ${font} font-size:13px; line-height:18px;">
            <a href="${esc(websiteRaw)}" target="_blank" style="color:#2563eb; text-decoration:none; ${font}">glofy.co</a>
          </div>

          ${linkedinBlock}
        </td>
      </tr>
    </table>

    <div style="height:10px; line-height:10px;">&nbsp;</div>

    <div style="${font} color:#9ca3af; font-size:12px; line-height:16px; max-width:520px;">
      ${esc(CONFIDENTIALITY_NOTICE)}
    </div>
  </div>
`;

      document.getElementById("signatureToCopy").innerHTML = html;
      document.getElementById("toast").textContent =
        "Firma generada. Usá “Copiar firma” y pegala en Gmail > Settings > Signature.";
    }

    function copySignature(){
      const el = document.getElementById("signatureToCopy");
      if (!el.innerHTML.trim()) renderSignature();

      const range = document.createRange();
    range.selectNode(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      const ok = document.execCommand("copy");
      sel.removeAllRanges();

      document.getElementById("toast").textContent = ok
        ? "Copiado. Pegalo en Gmail > Settings > Signature."
        : "No puede copiar automáticamente. Seleccioná la firma y copiá manualmente (Ctrl/Cmd+C).";
    }

   function clearAll(){
  ["name","title","linkedin","photo"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });
  document.getElementById("signatureToCopy").innerHTML = "";
  document.getElementById("toast").textContent = "Listo. Campos limpiados.";
}
  </script>
</body>
</html>
